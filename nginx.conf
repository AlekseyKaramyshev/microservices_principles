events {
    worker_connections 4;
}

http {
    upstream uploader_backend {
        server uploader:3000;
    }
    
    upstream security_backend {
        server security:3000;
    }
    
    upstream storage_backend {
        server storage:9000;
    }
    
    # Main gateway server
    server {
        listen 8080;
        server_name localhost;
        
        # Increase max body size for file uploads
        client_max_body_size 100M;
        
        # Health check endpoint
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
        
        # Token generation endpoint
        location /v1/token {
            proxy_pass http://security_backend/v1/token;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Token validation endpoint
        location /v1/token/validation {
            proxy_pass http://security_backend/v1/token/validation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # File upload endpoint
        location /v1/upload {
            proxy_pass http://uploader_backend/v1/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable buffering for large uploads
            proxy_request_buffering off;
            proxy_buffering off;
            
            # Timeout settings for large files
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
        
        # Status endpoints (optional, for debugging)
        location /uploader/status {
            proxy_pass http://uploader_backend/status;
            proxy_set_header Host $host;
        }
        
        location /security/status {
            proxy_pass http://security_backend/status;
            proxy_set_header Host $host;
        }
        
        # Metrics endpoints (if you need to expose them)
        location /uploader/metrics {
            proxy_pass http://uploader_backend/metrics;
            proxy_set_header Host $host;
        }
        
        # Default route - 404 for unknown paths
        location / {
            return 404 '{"error": "Not found"}';
            add_header Content-Type application/json;
        }
    }
}